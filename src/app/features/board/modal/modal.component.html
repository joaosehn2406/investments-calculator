<div class="backdrop">
  <div class="modal">

    <header class="modal-header">
      <h2>Saved Investments</h2>
      <button class="close-button">×</button>
    </header>

    <div class="search-box">
      <input
        type="text"
        placeholder="Search by investment title or description..."
      />
    </div>

    <div class="investments-list">
      @for (item of investments() | investmentSearchFilter: searchTerm() : ['title', 'description']; track item.id) {
        <div class="investment-item">
          <strong>{{ item.title }}</strong>
          <p>{{ item.description }}</p>
        </div>
      }
    </div>

  </div>
</div>
