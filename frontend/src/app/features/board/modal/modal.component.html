<div class="backdrop">
  <div class="modal">

    <header class="modal-header">
      <h2>Saved Investments</h2>
      <button type="button" class="close-button" (click)="onCloseModal()">×</button>
    </header>

    <div class="search-box">
      <input
        type="text"
        placeholder="Search by investment title or description..."
        [value]="searchTerm()"
        (input)="searchTerm.set($any($event.target).value.trim())"
      />
    </div>

    <div class="investments-list">
      @for (item of investments() | investmentSearchFilter: searchTerm() : ['title', 'description']; track item.id) {

        <div class="investment-item" (click)="onClickSelectItem(item)" [class.selected]="selectedIds().has(item.id)">

          <div class="item-left">
            <div class="item-top">
              <strong>{{ item.title }}</strong>
              <span class="badge"
                    [class.badge--annual]="item.periodType === 'year'"
                    [class.badge--monthly]="item.periodType === 'month'">
            {{ item.periodType === 'year' ? 'Annual' : 'Monthly' }}
          </span>
            </div>
            <p>{{ item.description }}</p>
          </div>

          <div class="item-right">
            <span class="item-date">{{ item.createdAt | date:'MMM d' }}</span>
            <span class="item-arrow">&rsaquo;</span>
          </div>

        </div>
      }

        <button
          type="button"
          class="compare-button"
          (click)="onClickCompare()"
          [disabled]="toastService.isVisible()"> COMPARE
        </button>

    </div>

  </div>
</div>
